<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Productos</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --border: #e5e7eb;
            --ok: #16a34a;
            --warn: #d97706;
            --danger: #dc2626;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9fafb;
        }

        th, td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 0.92rem;
        }

        th { color: var(--muted); font-weight: 600; }

        .pill {
            display: inline-block;
            padding: 0.25rem 0.55rem;
            border-radius: 999px;
            font-size: 0.78rem;
            color: white;
        }

        .ok { background: var(--ok); }
        .warn { background: var(--warn); }
        .danger { background: var(--danger); }

        .empty {
            padding: 1.5rem;
            text-align: center;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Productos</h1>
        <div class="actions">
            <a href="#" class="btn">Exportar</a>
            <a href="#" class="btn primary">+ Nuevo producto</a>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
            </tr>
            </thead>
            <tbody>
            <!-- Preview estático -->
            <tr>
                <td>1</td>
                <td>Hamburguesa Clásica</td>
                <td>Comida</td>
                <td>$85.00</td>
                <td>24</td>
                <td><span class="pill ok">Activo</span></td>
            </tr>
            <tr>
                <td>2</td>
                <td>Limonada Natural</td>
                <td>Bebidas</td>
                <td>$32.00</td>
                <td>9</td>
                <td><span class="pill warn">Bajo stock</span></td>
            </tr>
            <tr>
                <td>3</td>
                <td>Pastel de Chocolate</td>
                <td>Postres</td>
                <td>$48.00</td>
                <td>0</td>
                <td><span class="pill danger">Agotado</span></td>
            </tr>

            <!-- Ejemplo Thymeleaf (descomenta cuando envíes "productos" desde el controlador)
            <tr th:each="p, i : ${productos}">
              <td th:text="${i.count}">1</td>
              <td th:text="${p.nombre}">Nombre</td>
              <td th:text="${p.categoria}">Categoria</td>
              <td th:text="'$' + ${p.precio}">$0.00</td>
              <td th:text="${p.stock}">0</td>
              <td>
                <span class="pill"
                      th:classappend="${p.stock > 10} ? ' ok' : (${p.stock > 0} ? ' warn' : ' danger')"
                      th:text="${p.stock > 10} ? 'Activo' : (${p.stock > 0} ? 'Bajo stock' : 'Agotado')">
                  Estado
                </span>
              </td>
            </tr>
            -->
            </tbody>
        </table>

        <!-- Mensaje para cuando no haya datos -->
        <!-- <div class="empty" th:if="${#lists.isEmpty(productos)}">No hay productos registrados.</div> -->
    </div>
</div>
</body>
</html>
